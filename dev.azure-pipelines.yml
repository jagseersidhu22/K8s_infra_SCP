trigger:
 branches:
   include:
     - feature/aks/101

pool:
 name: jagseer-pc
  
stages:
  - stage: terraformInit
    displayName: Terraform intitiate and plan
    jobs:
      - job: Terraforminitplan
        displayName: tERRAFORM INIT JOB
        steps:
        - task: TerraformInstaller@1
          inputs:
            terraformVersion: 'latest'

        - task: TerraformTask@5
          inputs:
            provider: 'azurerm'
            command: 'init'
            workingDirectory: '$(System.DefaultWorkingDirectory)/Enviornmenrs/Dev'
            backendServiceArm: 'SP1-aks'
            backendAzureRmOverrideSubscriptionID: '68091150-801e-4498-8be2-e5d4bcf9919c'
            backendAzureRmResourceGroupName: 'imigrant-help'
            backendAzureRmStorageAccountName: 'jagseerstg123'
            backendAzureRmContainerName: 'containertf-aks'
            backendAzureRmKey: 'aks.terraforms.tfstate'

        - task: TerraformTask@5
          inputs:
            provider: 'azurerm'
            command: 'plan'
            workingDirectory: '$(System.DefaultWorkingDirectory)/Enviornmenrs/Dev'
            environmentServiceNameAzureRM: 'SP1-aks'

        